name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint
        run: ruff check src tests eval

      - name: Unit tests
        run: pytest -q

      - name: End-to-end (ingest sample + retrieval eval)
        run: |
          python -m samvidhan.ingest --text data/sample
          python eval/run_eval.py
